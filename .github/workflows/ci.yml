name: CI

on:
  push:
  pull_request:

jobs:
  core:
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run python -m pytest -q

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python -m boldt_posttrain.cli policy validate
      - run: uv run python -m boldt_posttrain.cli eval validate-suite
      - run: uv run python -m pytest -q tests/test_docs_commands.py tests/test_e2e_cpu.py
      - run: >-
          test -z "$(rg -n
          'real_not_implemented|missing_real_implementation|NotImplementedError'
          src scripts .claude tests)"
